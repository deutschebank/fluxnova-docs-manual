# theme.toml template for a Hugo theme
# See https://github.com/spf13/hugoThemes#themetoml for an example

name = "Flowave"
license = "ASF2"
licenselink = "https://github.com/finos/flowave-docs-theme/blob/main/LICENSE"
description = "Flowave Documentation Theme"
homepage = "https://github.com/finos/flowave-docs-theme"
tags = ["flowave", "finos"]
features = ["documentation", "manual"]
min_version = 0.145

[author]
  name = "Flowave Project"
  homepage = "https://flowave.finos.org/"

# If porting an existing theme
[original]
  name = "Camunda"
  homepage = "https://github.com/camunda/camunda-docs-theme"
  repo = "https://github.com/camunda/camunda-docs-theme"
